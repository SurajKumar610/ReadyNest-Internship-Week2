version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sightfill_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: sightfill
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sightfill_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: ./backend
    container_name: sightfill_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/sightfill
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=PROD_LEVEL_JWT_SECRET_KEY_SELECTION
      - OPENAI_API_KEY=
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace
      - ./sample-datasets:/workspace/sample-datasets
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build: ./backend
    container_name: sightfill_celery
    command: celery -A app.services.pipeline.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/sightfill
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/workspace
      - ./sample-datasets:/workspace/sample-datasets
    depends_on:
      - redis
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: sightfill_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
